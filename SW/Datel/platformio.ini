; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; Env layout (mesh OTA, see CLAUDE.md):
;   olimex_c3_ota     generic image, NO OBJ_ID (id from NVS), info logs -- OTA bench artifact
;   olimex_c3_deploy  generic image, NO OBJ_ID, CORE_DEBUG_LEVEL=0 -- production OTA artifact
;   olimex_c3_devN    USB provisioning: -DOBJ_ID=N seeds the id into NVS on boot
;   olimex_c3_bench   TEST_PECK bench loop (skips the mesh; never distribute via OTA)

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
monitor_filters = colorize
lib_deps =
	https://github.com/CNMAT/OSC.git
	https://git.iem.at/uc/osc_control.git
    bblanchon/ArduinoJson
	painlessmesh/painlessMesh@1.5.7

[common]
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DLED_PIN=8
	-DUSE_FS_LITTLEFS

[env:c3_mini_dev]
board = lolin_c3_mini
lib_ignore = ESPAsyncTCP
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=5
	-DUSE_FS_LITTLEFS

[env:olimex_c3_ota]
board = esp32-c3-devkitm-1
lib_ignore = ESPAsyncTCP
build_flags =
	${common.build_flags}
	-DCORE_DEBUG_LEVEL=3

[env:olimex_c3_deploy]
board = esp32-c3-devkitm-1
lib_ignore = ESPAsyncTCP
build_flags =
	${common.build_flags}
	-DCORE_DEBUG_LEVEL=0

[env:olimex_c3_bench]
board = esp32-c3-devkitm-1
lib_ignore = ESPAsyncTCP
build_flags =
	${common.build_flags}
	-DCORE_DEBUG_LEVEL=5
	-DTEST_PECK=1

[env:olimex_c3_dev0]
board = esp32-c3-devkitm-1
lib_ignore = ESPAsyncTCP
build_flags =
	${common.build_flags}
	-DCORE_DEBUG_LEVEL=5
	-DOBJ_ID=0

